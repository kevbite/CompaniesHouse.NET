name: Continuous Integration Workflow

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref == 'refs/heads/master' && format('8.0.{0}', github.run_number) || format('9.0.0-pre{0}', github.run_number) }}
      PUBLISH_PACKAGE: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/prerelease' }}
      DOCKER_BUILDKIT: 1
      BUILDKIT_PROGRESS: plain
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Docker Build NuGet packages
      env:
        COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
      run: |
        docker build --build-arg NUGET_PACKAGE_VERSION=${{ env.VERSION }} --secret id=companies_house_api_key,env=COMPANIES_HOUSE_API_KEY -f ./Dockerfile --output ./ .
    - name: Validate NuGet package metadata
      run: |
        mapfile -t packages < <(find ./artifacts -maxdepth 1 -type f -name '*.nupkg' ! -name '*.snupkg' | sort)
        if [ "${#packages[@]}" -eq 0 ]; then
          echo "No .nupkg files were produced."
          exit 1
        fi

        for package in "${packages[@]}"; do
          if ! unzip -Z1 "$package" | grep -qx "README.md"; then
            echo "README.md missing from package: $package"
            exit 1
          fi

          nuspec_path="$(unzip -Z1 "$package" | grep -E '\.nuspec$' | head -n 1)"
          if [ -z "$nuspec_path" ]; then
            echo "No .nuspec file found in package: $package"
            exit 1
          fi

          if ! unzip -p "$package" "$nuspec_path" | grep -q '<readme>README.md</readme>'; then
            echo "NuSpec readme metadata missing from package: $package"
            exit 1
          fi
        done
    - name: Publish Unit Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        trx_files: TestResults/**/*.trx
    - name: NuGet.Org push
      if: ${{ env.PUBLISH_PACKAGE }}
      run: |
        dotnet nuget push ./artifacts/*.nupkg --source NuGet.org --api-key ${{ secrets.NUGET_API_KEY }}
    - name: Generate release notes with NuGet links
      if: ${{ env.PUBLISH_PACKAGE }}
      run: |
        cat > release_notes.md <<EOF
## NuGet Packages

This release includes the following NuGet packages:

- [CompaniesHouse](https://www.nuget.org/packages/CompaniesHouse/${{ env.VERSION }}) - Core .NET client for Companies House API
- [CompaniesHouse.Extensions.Microsoft.DependencyInjection](https://www.nuget.org/packages/CompaniesHouse.Extensions.Microsoft.DependencyInjection/${{ env.VERSION }}) - DI helpers for ASP.NET Core / generic-host apps

Install via:
\`\`\`
dotnet add package CompaniesHouse
dotnet add package CompaniesHouse.Extensions.Microsoft.DependencyInjection
\`\`\`

See the [README](https://github.com/kevbite/CompaniesHouse.NET#readme) for usage instructions.
EOF
    - name: Create Release
      id: create_release
      if: ${{ env.PUBLISH_PACKAGE }}
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ env.VERSION }}
        name: Release ${{ env.VERSION }}
        body_path: release_notes.md
        files: |
          ./artifacts/*.nupkg
          ./artifacts/*.snupkg
        draft: false
        prerelease: false
